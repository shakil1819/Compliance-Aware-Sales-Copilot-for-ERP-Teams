name: "CI"

on:
  pull_request:
  push:
    branches:
      - "master"

permissions:
  contents: "read"
  checks: "write"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: "Quality Checks"
    runs-on: "ubuntu-latest"
    timeout-minutes: 20

    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v4"
        with:
          fetch-depth: 0

      - name: "Set up Python"
        id: "setup-python"
        uses: "actions/setup-python@v5"
        with:
          python-version-file: ".python-version"

      - name: "Install uv"
        uses: "astral-sh/setup-uv@v5"

      - name: "Restore cached uv environment"
        id: "uv-cache"
        uses: "actions/cache@v4"
        with:
          path: |
            .venv
            ${{ env.UV_CACHE_DIR }}
          key: "${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-uv-${{ hashFiles('uv.lock') }}"

      - name: "Report lockfile cache hit"
        if: "steps.uv-cache.outputs.cache-hit == 'true'"
        run: |
          echo "Exact cache hit for current uv.lock"
          echo "Skipping uv sync because the cached .venv matches this lockfile."

      - name: "Install dependencies from lockfile"
        if: "steps.uv-cache.outputs.cache-hit != 'true'"
        run: "uv sync --locked --dev"

      - name: "Run pre-commit"
        run: "uv run pre-commit run --all-files"

      - name: "Run pytest with JUnit output"
        id: "pytest"
        continue-on-error: true
        shell: "bash"
        run: |
          set -euo pipefail
          mkdir -p test-results
          uv run pytest --junitxml=test-results/pytest-junit.xml

      - name: "Publish unit test report"
        if: "always() && hashFiles('test-results/pytest-junit.xml') != ''"
        uses: "dorny/test-reporter@v1"
        with:
          name: "Unit Tests (pytest)"
          path: "test-results/pytest-junit.xml"
          reporter: "java-junit"
          fail-on-error: "true"

      - name: "Run secret scan"
        uses: "gitleaks/gitleaks-action@v2"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: "Fail if pytest failed"
        if: "steps.pytest.outcome == 'failure'"
        run: |
          echo "pytest failed. See the published unit test report for details."
          exit 1
